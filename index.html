<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>POSChat IA</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e; --bg2:#161616; --bg3:#1e1e1e;
  --border:#2a2a2a; --green:#22c55e;
  --white:#ffffff; --gray:#777; --gray2:#444;
  --chip:#1c1c1c; --chip-b:#2e2e2e; --inp:#181818;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg)}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 11px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);z-index:10}
.tl{display:flex;align-items:center;gap:10px}
.avsm{width:40px;height:40px;border-radius:50%;border:2px solid var(--green);overflow:hidden;background:#111;flex-shrink:0}
.avsm img{width:100%;height:100%;object-fit:cover}
.tname{font-size:.93rem;font-weight:700;letter-spacing:-.2px}
.tst{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--green);margin-top:2px;font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.tact{display:flex;gap:7px}
.ibtn{width:36px;height:36px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);color:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.ibtn:hover{background:#252525}
.ibtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* MODEL BAR */
.mbar{display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.mbadge{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green);font-size:.67rem;font-weight:700;letter-spacing:.4px;padding:3px 10px;border-radius:20px;cursor:pointer;transition:all .2s}
.mbadge:hover{background:rgba(34,197,94,.18)}
.mfree{color:var(--gray);font-size:.67rem}
.db-status{display:flex;align-items:center;gap:4px;font-size:.67rem;font-weight:600}
.db-ok{color:#4ade80}.db-err{color:#f87171}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:0 0 8px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.msgs::-webkit-scrollbar{width:0}

/* WELCOME */
.welcome{display:flex;flex-direction:column;align-items:center;padding:32px 22px 18px;text-align:center}
.avwrap{position:relative;width:105px;height:105px;margin-bottom:18px}
.avglow{position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.28) 0%,transparent 70%);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
.avring{position:absolute;inset:0;border-radius:50%;border:2.5px solid var(--green);animation:rp 3s ease-in-out infinite}
@keyframes rp{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}
.avimg{width:100%;height:100%;border-radius:50%;object-fit:cover;background:#111;position:relative;z-index:1}
.wtit{font-size:1.45rem;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.wtit span{color:var(--green)}
.wsub{font-size:.83rem;color:var(--gray);line-height:1.65;max-width:285px;margin-bottom:22px}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px}
.chip{display:flex;align-items:center;gap:6px;background:var(--chip);border:1px solid var(--chip-b);color:#ccc;padding:8px 14px;border-radius:22px;font-size:.79rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.chip:hover{background:#232323;border-color:#3a3a3a;color:var(--white);transform:translateY(-1px)}
.chip svg{width:13px;height:13px;stroke:#555;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* BUBBLES */
.mg{padding:5px 13px}
.msg{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;border:1.5px solid var(--border);background:#111;display:flex;align-items:center;justify-content:center}
.mav img{width:100%;height:100%;object-fit:cover}
.mav svg{width:14px;height:14px;stroke:#555;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bubble{max-width:80%;padding:10px 14px;border-radius:17px;font-size:.855rem;line-height:1.62}
.msg.assistant .bubble{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--white)}
.msg.user .bubble{background:var(--green);color:#000;font-weight:500;border-bottom-right-radius:4px}
.msg.assistant .bubble strong{color:#a3e635}
.msg.assistant .bubble code{background:#111;padding:1px 5px;border-radius:4px;font-size:.81rem;color:#67e8f9;font-family:monospace}
.msg.assistant .bubble .kv{display:flex;gap:6px;margin:2px 0;font-size:.82rem}
.msg.assistant .bubble .kv .k{color:var(--gray);min-width:120px}
.msg.assistant .bubble .kv .v{color:var(--white);font-weight:500}

/* DB RESULT CARD */
.db-card{background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:.78rem}
.db-card .dc-title{color:var(--green);font-weight:700;font-size:.72rem;letter-spacing:.4px;margin-bottom:6px;text-transform:uppercase}
.db-card .dc-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.db-card .dc-row:last-child{border:none}
.db-card .dc-k{color:#888}.db-card .dc-v{color:var(--white);font-weight:600}

/* TOOLS ROW */
.trow{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0 0 36px}
.ttag{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.18);color:#4ade80;font-size:.63rem;font-weight:700;padding:2px 8px;border-radius:9px;letter-spacing:.3px}

/* TYPING */
.tybub{background:var(--bg3);border:1px solid var(--border);border-radius:17px;border-bottom-left-radius:4px;padding:11px 15px;display:inline-flex;gap:5px;align-items:center}
.tybub span{width:6px;height:6px;background:var(--gray);border-radius:50%;animation:bounce .8s infinite}
.tybub span:nth-child(2){animation-delay:.15s}
.tybub span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.cursor{display:inline-block;width:2px;height:13px;background:var(--green);margin-left:2px;vertical-align:middle;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* INPUT */
.inpw{padding:9px 13px 16px;flex-shrink:0;background:var(--bg)}
.inpb{display:flex;align-items:center;gap:7px;background:var(--inp);border:1px solid var(--border);border-radius:26px;padding:7px 7px 7px 16px;transition:border-color .2s}
.inpb:focus-within{border-color:#333}
#inp{flex:1;background:none;border:none;outline:none;color:var(--white);font-size:.86rem;font-family:'Inter',sans-serif;resize:none;max-height:96px;line-height:1.5}
#inp::placeholder{color:var(--gray2)}
.abtn{width:34px;height:34px;border-radius:50%;background:none;border:none;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .2s}
.abtn:hover{color:#aaa}
.abtn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sbtn{width:38px;height:38px;border-radius:50%;background:var(--green);border:none;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sbtn:hover{background:#16a34a;transform:scale(1.05)}
.sbtn:disabled{background:#1a2e1a;cursor:default;transform:none}
.sbtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round;margin-left:1px}

/* LIGHT */
.lt{--bg:#f5f5f5;--bg2:#eee;--bg3:#e2e2e2;--border:#d0d0d0;--white:#111;--gray:#666;--gray2:#aaa;--chip:#e8e8e8;--chip-b:#ccc;--inp:#e5e5e5}
@media(min-width:520px){.app{border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 60px rgba(0,0,0,.6)}body{background:#080808}}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="topbar">
    <div class="tl">
      <div class="avsm"><img src="https://media.base44.com/images/public/69dbad34b7190bc2a2faee7c/c571fa4ed_1000139184-removebg-preview.png" alt="POSChat"/></div>
      <div>
        <div class="tname">POSChat IA</div>
        <div class="tst"><span class="dot"></span>En línea</div>
      </div>
    </div>
    <div class="tact">
      <button class="ibtn" onclick="newChat()" title="Nueva conversación">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
      <button class="ibtn" onclick="toggleTheme()" title="Tema">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>

  <div class="mbar">
    <span class="mbadge" id="mbadge" onclick="nextModel()">⚡ DeepSeek v4 Flash</span>
    <span class="mfree">· via Puter.js</span>
    <span class="db-status" id="dbst"><span class="db-ok">●</span> DB conectada</span>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="inpw">
    <div class="inpb">
      <textarea id="inp" rows="1" placeholder="Pregunta sobre tu negocio..." onkeydown="hk(event)" oninput="rs(this)"></textarea>
      <label class="abtn" title="Adjuntar">
        <input type="file" style="display:none" accept="image/*,.pdf,.txt" onchange="hf(event)"/>
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </label>
      <button class="sbtn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>
<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const LOGO = "https://media.base44.com/images/public/69dbad34b7190bc2a2faee7c/c571fa4ed_1000139184-removebg-preview.png";
const DB_URL = "https://api.base44.com/api/apps/69dbad34b7190bc2a2faee7c/functions/posDB";

const MODELS = [
  { id:"deepseek/deepseek-v4-flash", label:"⚡ DeepSeek v4 Flash" },
  { id:"deepseek/deepseek-v4-pro",   label:"🧠 DeepSeek v4 Pro" },
  { id:"deepseek/deepseek-v3.2",     label:"🔬 DeepSeek v3.2" },
  { id:"deepseek/deepseek-r1-0528",  label:"💡 DeepSeek R1" },
];

// Herramientas que DeepSeek puede invocar — todas llaman al backend Deno
const TOOLS = [
  { type:"function", function:{ name:"listar_productos", description:"Lista todos los productos del inventario con nombre, precio y stock.", parameters:{ type:"object", properties:{}, required:[] } } },
  { type:"function", function:{ name:"buscar_producto", description:"Busca un producto por nombre.", parameters:{ type:"object", properties:{ nombre:{type:"string"} }, required:["nombre"] } } },
  { type:"function", function:{ name:"productos_stock_bajo", description:"Lista los productos con stock igual o menor al mínimo.", parameters:{ type:"object", properties:{}, required:[] } } },
  { type:"function", function:{ name:"crear_producto", description:"Agrega un nuevo producto al catálogo.", parameters:{ type:"object", properties:{ nombre:{type:"string"}, categoria:{type:"string"}, precio_RD:{type:"number"}, stock:{type:"number"}, stock_minimo:{type:"number"} }, required:["nombre","precio_RD","stock"] } } },
  { type:"function", function:{ name:"actualizar_precio", description:"Actualiza el precio de un producto.", parameters:{ type:"object", properties:{ id:{type:"string"}, precio_RD:{type:"number"} }, required:["id","precio_RD"] } } },
  { type:"function", function:{ name:"actualizar_stock", description:"Actualiza el stock de un producto.", parameters:{ type:"object", properties:{ id:{type:"string"}, stock:{type:"number"} }, required:["id","stock"] } } },
  { type:"function", function:{ name:"listar_clientes", description:"Lista todos los clientes.", parameters:{ type:"object", properties:{}, required:[] } } },
  { type:"function", function:{ name:"clientes_con_deuda", description:"Lista clientes que tienen balance de deuda pendiente.", parameters:{ type:"object", properties:{}, required:[] } } },
  { type:"function", function:{ name:"crear_cliente", description:"Registra un nuevo cliente.", parameters:{ type:"object", properties:{ nombre:{type:"string"}, telefono:{type:"string"}, balance_deuda:{type:"number"} }, required:["nombre"] } } },
  { type:"function", function:{ name:"actualizar_deuda", description:"Actualiza el balance de deuda de un cliente.", parameters:{ type:"object", properties:{ id:{type:"string"}, balance_deuda:{type:"number"} }, required:["id","balance_deuda"] } } },
  { type:"function", function:{ name:"listar_pedidos", description:"Lista pedidos, opcionalmente filtrados por estado.", parameters:{ type:"object", properties:{ estado:{type:"string", enum:["Pendiente","Despachado","Entregado","Cancelado"]} }, required:[] } } },
  { type:"function", function:{ name:"crear_pedido", description:"Registra un nuevo pedido de venta.", parameters:{ type:"object", properties:{ cliente_nombre:{type:"string"}, productos:{type:"string", description:"JSON array: [{nombre,cantidad,precio}]"}, total_RD:{type:"number"}, estado:{type:"string"} }, required:["cliente_nombre","productos","total_RD"] } } },
  { type:"function", function:{ name:"actualizar_estado_pedido", description:"Cambia el estado de un pedido.", parameters:{ type:"object", properties:{ id:{type:"string"}, estado:{type:"string"} }, required:["id","estado"] } } },
  { type:"function", function:{ name:"ventas_hoy", description:"Resumen de ventas del día de hoy.", parameters:{ type:"object", properties:{}, required:[] } } },
  { type:"function", function:{ name:"resumen_general", description:"Resumen general del negocio: productos, clientes, pedidos y ventas de hoy.", parameters:{ type:"object", properties:{}, required:[] } } },
];

const SYS = `Eres POSChat, el asistente inteligente de un colmado / negocio en República Dominicana.
Tienes acceso COMPLETO y REAL a la base de datos del negocio a través de herramientas.
REGLAS OBLIGATORIAS:
- Cuando te pregunten sobre datos (productos, clientes, pedidos, ventas), SIEMPRE usa las herramientas para obtener información real. NUNCA inventes datos.
- Cuando el usuario pida registrar/crear/actualizar algo, usa la herramienta correspondiente.
- Después de ejecutar una herramienta, presenta los datos de forma clara y en español dominicano natural.
- Si hay múltiples herramientas relevantes, úsalas en secuencia.
- Responde de forma concisa y directa. Usa emojis con moderación.
Fecha/Hora: ${new Date().toLocaleString("es-DO",{timeZone:"America/Santo_Domingo"})}`;

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let msgs = [];
let busy = false;
let dark = true;
let midx = 0;
let dbOk = true;

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderWelcome();
pingDB();

async function pingDB(){
  try{
    const r = await fetch(DB_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"resumen_general"})});
    const d = await r.json();
    dbOk = d.ok;
    const el = document.getElementById("dbst");
    if(dbOk){
      const res = d.result;
      el.innerHTML=`<span class="db-ok">●</span> DB: ${res.total_productos}P · ${res.total_clientes}C · ${res.pedidos_hoy} pedidos hoy`;
    } else {
      el.innerHTML=`<span class="db-err">●</span> DB sin conexión`;
    }
  } catch(e){ document.getElementById("dbst").innerHTML=`<span class="db-err">●</span> DB sin conexión`; }
}

// ══════════════════════════════════════════════
// WELCOME
// ══════════════════════════════════════════════
function renderWelcome(){
  document.getElementById("msgs").innerHTML=`
  <div class="welcome">
    <div class="avwrap">
      <div class="avglow"></div><div class="avring"></div>
      <img class="avimg" src="${LOGO}" alt="POSChat"/>
    </div>
    <div class="wtit">Hola, soy <span>POSChat</span></div>
    <div class="wsub">Tu asistente con acceso real a tu inventario, pedidos y clientes en Base44.</div>
    <div class="chips">
      <button class="chip" onclick="sug('Dame el resumen general de mi negocio')">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Resumen
      </button>
      <button class="chip" onclick="sug('Lista todos los productos del inventario con precios y stock')">
        <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        Inventario
      </button>
      <button class="chip" onclick="sug('Muéstrame los pedidos pendientes')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
        Pedidos
      </button>
      <button class="chip" onclick="sug('¿Cuánto vendí hoy?')">
        <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Ventas hoy
      </button>
      <button class="chip" onclick="sug('¿Qué productos tienen stock bajo?')">
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Stock bajo
      </button>
      <button class="chip" onclick="sug('Lista los clientes que tienen deuda pendiente')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Deudas
      </button>
    </div>
  </div>`;
}

// ══════════════════════════════════════════════
// LLAMADA AL BACKEND DENO
// ══════════════════════════════════════════════
async function callDB(action, params={}){
  const r = await fetch(DB_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({action, params})
  });
  const d = await r.json();
  if(!d.ok) throw new Error(d.error || "Error en DB");
  return d.result;
}

// ══════════════════════════════════════════════
// EJECUTAR TOOL CALL
// ══════════════════════════════════════════════
async function runTool(name, args){
  // Mapear nombre de herramienta → acción en el backend
  const actionMap = {
    listar_productos:       ["listar_productos", {}],
    buscar_producto:        ["buscar_producto", args],
    productos_stock_bajo:   ["productos_stock_bajo", {}],
    crear_producto:         ["crear_producto", args],
    actualizar_precio:      ["actualizar_precio", args],
    actualizar_stock:       ["actualizar_stock", args],
    listar_clientes:        ["listar_clientes", {}],
    clientes_con_deuda:     ["clientes_con_deuda", {}],
    crear_cliente:          ["crear_cliente", args],
    actualizar_deuda:       ["actualizar_deuda", args],
    listar_pedidos:         ["listar_pedidos", args],
    crear_pedido:           ["crear_pedido", args],
    actualizar_estado_pedido: ["actualizar_estado_pedido", args],
    ventas_hoy:             ["ventas_hoy", {}],
    resumen_general:        ["resumen_general", {}],
  };
  const [action, params] = actionMap[name] || [name, args];
  return await callDB(action, params);
}

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════
function rs(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,96)+"px"}
function hk(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}
function hf(e){const f=e.target.files[0];if(f)addBubble("user","📎 "+f.name)}
function scroll(){const el=document.getElementById("msgs");setTimeout(()=>el.scrollTop=el.scrollHeight,50)}
function newChat(){msgs=[];renderWelcome();pingDB()}
function toggleTheme(){dark=!dark;document.getElementById("app").classList.toggle("lt",!dark)}
function sug(t){document.getElementById("inp").value=t;send()}
function nextModel(){midx=(midx+1)%MODELS.length;document.getElementById("mbadge").textContent=MODELS[midx].label}

function addBubble(role,text,tools=[]){
  document.querySelector(".welcome")?.remove();
  const c=document.getElementById("msgs");
  const d=document.createElement("div");
  d.className="mg";
  const th=tools.length?`<div class="trow">${tools.map(t=>`<span class="ttag">⚡ ${t}</span>`).join("")}</div>`:"";
  if(role==="user"){
    d.innerHTML=`<div class="msg user">
      <div class="bubble">${esc(text)}</div>
      <div class="mav"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    </div>`;
  } else {
    d.innerHTML=`<div class="msg assistant">
      <div class="mav"><img src="${LOGO}" alt="bot"/></div>
      <div class="bubble">${fmt(text)}</div>
    </div>${th}`;
  }
  c.appendChild(d);scroll();
  return d.querySelector(".bubble");
}

function addTyping(){
  document.querySelector(".welcome")?.remove();
  const c=document.getElementById("msgs");
  const d=document.createElement("div");
  d.className="mg";d.id="ty";
  d.innerHTML=`<div class="msg assistant">
    <div class="mav"><img src="${LOGO}" alt="bot"/></div>
    <div class="tybub"><span></span><span></span><span></span></div>
  </div>`;
  c.appendChild(d);scroll();
}
function remTyping(){document.getElementById("ty")?.remove()}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br/>")}
function fmt(s){
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\n/g,"<br/>");
}

// ══════════════════════════════════════════════
// SEND — AGENTIC LOOP COMPLETO
// ══════════════════════════════════════════════
async function send(){
  const el=document.getElementById("inp");
  const txt=el.value.trim();
  if(!txt||busy)return;

  busy=true;
  el.value="";el.style.height="auto";
  document.getElementById("sbtn").disabled=true;

  msgs.push({role:"user",content:txt});
  addBubble("user",txt);
  addTyping();

  const toolsUsed=[];

  try {
    // Construir historial para Puter.js con system prompt
    const chatHistory=[
      {role:"system", content:SYS},
      ...msgs.map(m=>({role:m.role,content:m.content}))
    ];

    // ── AGENTIC LOOP: hasta 6 rondas de tool calls ──
    for(let round=0; round<6; round++){
      const resp = await puter.ai.chat(chatHistory, {
        model: MODELS[midx].id,
        tools: TOOLS,
      });

      const msg = resp?.message || resp;
      const content = msg?.content || "";
      const toolCalls = msg?.tool_calls || [];

      // Sin tool calls → respuesta final, hacer streaming
      if(!toolCalls.length){
        remTyping();
        // Añadir burbuja con streaming simulado (la respuesta ya llegó completa)
        document.querySelector(".welcome")?.remove();
        const c=document.getElementById("msgs");
        const wrap=document.createElement("div");
        wrap.className="mg";
        wrap.innerHTML=`<div class="msg assistant">
          <div class="mav"><img src="${LOGO}" alt="bot"/></div>
          <div class="bubble" id="final-bubble"></div>
        </div>${toolsUsed.length?`<div class="trow">${toolsUsed.map(t=>`<span class="ttag">⚡ ${t}</span>`).join("")}</div>`:""}`;
        c.appendChild(wrap);scroll();
        const bubble=document.getElementById("final-bubble");

        // Simular streaming letra por letra para efecto visual
        const finalText=content||"No pude obtener una respuesta.";
        msgs.push({role:"assistant",content:finalText});
        let shown="";
        for(const char of finalText){
          shown+=char;
          bubble.innerHTML=fmt(shown)+'<span class="cursor"></span>';
          scroll();
          await new Promise(r=>setTimeout(r,4)); // 4ms por char
        }
        bubble.innerHTML=fmt(finalText);
        break;
      }

      // Hay tool calls → ejecutar en el backend Deno
      chatHistory.push({role:"assistant",content,tool_calls:toolCalls});

      for(const tc of toolCalls){
        const fnName = tc.function?.name || tc.name;
        let fnArgs = {};
        try{ fnArgs=JSON.parse(tc.function?.arguments||tc.arguments||"{}"); }catch(_){}

        toolsUsed.push(fnName);

        // Mostrar que está consultando la DB
        const tyEl=document.getElementById("ty");
        if(tyEl) tyEl.querySelector(".tybub").innerHTML=`<span></span><span></span><span></span><span style="font-size:.65rem;color:#4ade80;margin-left:4px;white-space:nowrap">📡 ${fnName.replace(/_/g," ")}…</span>`;

        let toolResult;
        try{
          toolResult = await runTool(fnName, fnArgs);
        } catch(e){
          toolResult = { error: e.message };
        }

        chatHistory.push({
          role:"tool",
          tool_call_id: tc.id || tc.function?.name,
          name: fnName,
          content: JSON.stringify(toolResult)
        });
      }
    }

  } catch(err){
    remTyping();
    addBubble("assistant","❌ Error: "+err.message);
  }

  busy=false;
  document.getElementById("sbtn").disabled=false;
  el.focus();
  // Refrescar estado de DB en la barra
  pingDB();
}
</script>
</body>
</html>
