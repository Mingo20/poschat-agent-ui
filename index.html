<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>POSChat IA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;
  --bg2:#161616;
  --bg3:#1e1e1e;
  --border:#2a2a2a;
  --green:#22c55e;
  --green2:#16a34a;
  --white:#ffffff;
  --gray:#888;
  --gray2:#555;
  --chip:#1f1f1f;
  --chip-border:#333;
  --input-bg:#1a1a1a;
  --send:#22c55e;
}

html,body{
  height:100%;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--white);
  overflow:hidden;
}

/* ── APP SHELL ── */
.app{
  display:flex;
  flex-direction:column;
  height:100vh;
  max-width:480px;
  margin:0 auto;
  position:relative;
  background:var(--bg);
}

/* ── TOPBAR ── */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px 12px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--bg);
  z-index:10;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:11px;
}

.avatar-sm{
  width:42px;height:42px;
  border-radius:50%;
  border:2px solid var(--green);
  overflow:hidden;
  flex-shrink:0;
  background:#111;
  display:flex;align-items:center;justify-content:center;
}
.avatar-sm img{width:100%;height:100%;object-fit:cover}

.topbar-info{}
.topbar-name{font-size:.95rem;font-weight:700;letter-spacing:-.2px}
.topbar-status{
  display:flex;align-items:center;gap:5px;
  font-size:.72rem;color:var(--green);margin-top:2px;font-weight:500;
}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.topbar-actions{display:flex;gap:8px}
.icon-btn{
  width:38px;height:38px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.icon-btn:hover{background:#2a2a2a}
.icon-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── MESSAGES AREA ── */
.messages{
  flex:1;
  overflow-y:auto;
  padding:0 0 8px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.messages::-webkit-scrollbar{width:0}

/* ── WELCOME SCREEN ── */
.welcome{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 28px 24px;
  text-align:center;
}

.avatar-wrap{
  position:relative;
  width:110px;height:110px;
  margin-bottom:22px;
}

.avatar-glow{
  position:absolute;inset:-8px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(34,197,94,.35) 0%, transparent 70%);
  animation:glow 3s ease-in-out infinite;
}
@keyframes glow{
  0%,100%{opacity:.6;transform:scale(1)}
  50%{opacity:1;transform:scale(1.08)}
}

.avatar-ring{
  position:absolute;inset:0;
  border-radius:50%;
  border:2.5px solid var(--green);
  animation:ring-pulse 3s ease-in-out infinite;
}
@keyframes ring-pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}
  50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}
}

.avatar-img{
  width:100%;height:100%;
  border-radius:50%;
  object-fit:cover;
  background:#111;
  position:relative;z-index:1;
}

.welcome-title{
  font-size:1.55rem;
  font-weight:700;
  margin-bottom:10px;
  letter-spacing:-.3px;
  line-height:1.3;
}
.welcome-title span{color:var(--green)}

.welcome-sub{
  font-size:.875rem;
  color:var(--gray);
  line-height:1.65;
  max-width:300px;
  margin-bottom:30px;
}

/* ── CHIPS ── */
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  max-width:340px;
}

.chip{
  display:flex;align-items:center;gap:7px;
  background:var(--chip);
  border:1px solid var(--chip-border);
  color:var(--white);
  padding:9px 16px;
  border-radius:22px;
  font-size:.82rem;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
  font-family:'Inter',sans-serif;
  letter-spacing:-.1px;
}
.chip:hover{
  background:#2a2a2a;
  border-color:#444;
  transform:translateY(-1px);
}
.chip svg{
  width:14px;height:14px;
  stroke:var(--gray);fill:none;
  stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
  flex-shrink:0;
}

/* ── MENSAJES ── */
.msg-group{padding:6px 16px}
.msg{
  display:flex;
  gap:9px;
  margin-bottom:12px;
  align-items:flex-end;
}
.msg.user{flex-direction:row-reverse}

.msg-av{
  width:30px;height:30px;border-radius:50%;
  flex-shrink:0;overflow:hidden;
  border:1.5px solid var(--border);
  background:#111;
  display:flex;align-items:center;justify-content:center;
}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-av.user-av{background:var(--bg3);border-color:var(--border)}
.msg-av svg{width:16px;height:16px;stroke:#888;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.bubble{
  max-width:78%;
  padding:11px 14px;
  border-radius:18px;
  font-size:.875rem;
  line-height:1.6;
}
.msg.assistant .bubble{
  background:var(--bg3);
  border:1px solid var(--border);
  border-bottom-left-radius:5px;
  color:var(--white);
}
.msg.user .bubble{
  background:var(--green);
  color:#000;
  font-weight:500;
  border-bottom-right-radius:5px;
}

.msg-time{
  font-size:.65rem;color:var(--gray2);
  padding:0 2px;margin-bottom:2px;
}

/* tools used */
.tools-row{
  display:flex;flex-wrap:wrap;gap:5px;
  margin-top:7px;margin-left:39px;
}
.tool-tag{
  background:rgba(34,197,94,.1);
  border:1px solid rgba(34,197,94,.25);
  color:var(--green);
  font-size:.67rem;font-weight:600;
  padding:2px 9px;border-radius:10px;
  letter-spacing:.3px;
}

/* ── TYPING ── */
.typing-bubble{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:18px;border-bottom-left-radius:5px;
  padding:12px 16px;display:inline-flex;gap:5px;align-items:center;
}
.typing-bubble span{
  width:7px;height:7px;background:var(--gray);border-radius:50%;
  animation:bounce .8s infinite;
}
.typing-bubble span:nth-child(2){animation-delay:.15s}
.typing-bubble span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ── INPUT AREA ── */
.input-wrap{
  padding:10px 14px 18px;
  flex-shrink:0;
  background:var(--bg);
}

.input-box{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--input-bg);
  border:1px solid var(--border);
  border-radius:28px;
  padding:8px 8px 8px 18px;
  transition:border-color .2s;
}
.input-box:focus-within{border-color:#3a3a3a}

#msgInput{
  flex:1;background:none;border:none;outline:none;
  color:var(--white);font-size:.88rem;
  font-family:'Inter',sans-serif;
  resize:none;max-height:100px;
  line-height:1.5;
}
#msgInput::placeholder{color:var(--gray2)}

.attach-btn{
  width:36px;height:36px;border-radius:50%;
  background:none;border:none;
  color:var(--gray);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .2s;
}
.attach-btn:hover{color:var(--white)}
.attach-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.send-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--green);border:none;
  color:#000;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s, transform .15s;
}
.send-btn:hover{background:#16a34a;transform:scale(1.05)}
.send-btn:disabled{background:#1f3a28;cursor:default;transform:none}
.send-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;margin-left:2px}

/* ── THEME TOGGLE ── */
.light-theme{
  --bg:#f5f5f5;--bg2:#ebebeb;--bg3:#e0e0e0;
  --border:#d0d0d0;--white:#111;--gray:#666;
  --gray2:#999;--chip:#e8e8e8;--chip-border:#ccc;
  --input-bg:#e8e8e8;
}

/* ── DESKTOP ── */
@media(min-width:520px){
  .app{
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
    box-shadow:0 0 60px rgba(0,0,0,.5);
  }
  body{background:#0a0a0a}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="avatar-sm">
        <img src="https://media.base44.com/images/public/69dbad34b7190bc2a2faee7c/c571fa4ed_1000139184-removebg-preview.png" alt="POSChat"/>
      </div>
      <div class="topbar-info">
        <div class="topbar-name">POSChat IA</div>
        <div class="topbar-status">
          <span class="status-dot"></span>
          En línea
        </div>
      </div>
    </div>
    <div class="topbar-actions">
      <!-- Nuevo chat -->
      <button class="icon-btn" onclick="newChat()" title="Nueva conversación">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
      <!-- Tema -->
      <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="msgs"></div>

  <!-- INPUT -->
  <div class="input-wrap">
    <div class="input-box">
      <textarea id="msgInput" rows="1"
        placeholder="Escríbele a POSChat..."
        onkeydown="handleKey(event)"
        oninput="resize(this)"></textarea>
      <label class="attach-btn" title="Adjuntar">
        <input type="file" style="display:none" accept="image/*,.pdf,.txt" onchange="handleFile(event)"/>
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </label>
      <button class="send-btn" id="sendBtn" onclick="send()" title="Enviar">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──
const API_KEY = "AIzaSyC8zRNm76Ii1s2aG_7rUPaaxipbW_3Ey0M"; // usa GOOGLE_API_KEY del backend
const BACKEND_URL = "https://api.base44.com/api/apps/69dbad34b7190bc2a2faee7c/functions/geminiChat";
const LOGO_URL = "https://media.base44.com/images/public/69dbad34b7190bc2a2faee7c/c571fa4ed_1000139184-removebg-preview.png";

// ── STATE ──
let messages = [];
let loading = false;
let darkMode = true;

// ── INIT ──
renderWelcome();

// ── WELCOME ──
function renderWelcome() {
  const el = document.getElementById("msgs");
  el.innerHTML = `
  <div class="welcome">
    <div class="avatar-wrap">
      <div class="avatar-glow"></div>
      <div class="avatar-ring"></div>
      <img class="avatar-img" src="${LOGO_URL}" alt="POSChat"/>
    </div>
    <div class="welcome-title">Hola, soy <span>POSChat</span></div>
    <div class="welcome-sub">Tu asistente inteligente. Puedo ayudarte con inventario, pedidos, clientes, ventas y mucho más.</div>
    <div class="chips">
      <button class="chip" onclick="suggest('Ver mi inventario completo')">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Inventario
      </button>
      <button class="chip" onclick="suggest('Muéstrame los pedidos pendientes')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Pedidos
      </button>
      <button class="chip" onclick="suggest('¿Qué puedes hacer?')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        ¿Qué haces?
      </button>
      <button class="chip" onclick="suggest('¿Cuánto vendí hoy?')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Ventas hoy
      </button>
      <button class="chip" onclick="suggest('Lista los clientes con deuda pendiente')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Clientes
      </button>
      <button class="chip" onclick="suggest('Agrega un producto nuevo al catálogo')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nuevo producto
      </button>
    </div>
  </div>`;
}

// ── SUGGEST ──
function suggest(txt) {
  document.getElementById("msgInput").value = txt;
  send();
}

// ── HELPERS ──
function resize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
}

function handleFile(e) {
  const f = e.target.files[0];
  if (!f) return;
  addMsg("user", `📎 Archivo adjunto: ${f.name}`);
}

function now() {
  return new Date().toLocaleTimeString("es-DO", { hour: "2-digit", minute: "2-digit" });
}

function scroll() {
  const el = document.getElementById("msgs");
  setTimeout(() => el.scrollTop = el.scrollHeight, 60);
}

function toggleTheme() {
  darkMode = !darkMode;
  document.getElementById("app").classList.toggle("light-theme", !darkMode);
}

function newChat() {
  messages = [];
  renderWelcome();
}

// ── ADD MESSAGE ──
function addMsg(role, text, tools = []) {
  const welcome = document.querySelector(".welcome");
  if (welcome) welcome.remove();

  const el = document.getElementById("msgs");
  const div = document.createElement("div");
  div.className = "msg-group";

  const toolsHtml = tools.length
    ? `<div class="tools-row">${tools.map(t => `<span class="tool-tag">⚡ ${t}</span>`).join("")}</div>`
    : "";

  if (role === "user") {
    div.innerHTML = `
      <div class="msg user">
        <div class="bubble">${esc(text)}</div>
        <div class="msg-av user-av">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg assistant">
        <div class="msg-av">
          <img src="${LOGO_URL}" alt="bot"/>
        </div>
        <div class="bubble">${esc(text)}</div>
      </div>
      ${toolsHtml}`;
  }

  el.appendChild(div);
  scroll();
}

function addTyping() {
  const welcome = document.querySelector(".welcome");
  if (welcome) welcome.remove();
  const el = document.getElementById("msgs");
  const d = document.createElement("div");
  d.className = "msg-group"; d.id = "typing";
  d.innerHTML = `<div class="msg assistant">
    <div class="msg-av"><img src="${LOGO_URL}" alt="bot"/></div>
    <div class="typing-bubble"><span></span><span></span><span></span></div>
  </div>`;
  el.appendChild(d); scroll();
}

function removeTyping() { document.getElementById("typing")?.remove(); }

function esc(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br/>");
}

// ── SEND ──
async function send() {
  const inp = document.getElementById("msgInput");
  const txt = inp.value.trim();
  if (!txt || loading) return;

  loading = true;
  inp.value = ""; inp.style.height = "auto";
  document.getElementById("sendBtn").disabled = true;

  messages.push({ role: "user", content: txt });
  addMsg("user", txt);
  addTyping();

  try {
    // Intentar primero con el backend Base44
    const res = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: messages.map(m => ({ role: m.role, content: m.content })), userId: "poschat-user" })
    });
    const data = await res.json();
    removeTyping();

    if (data.response && data.response !== "No pude generar respuesta.") {
      messages.push({ role: "assistant", content: data.response });
      addMsg("assistant", data.response, data.toolsUsed || []);
    } else {
      // Fallback directo a Gemini desde el frontend
      await callGeminiFrontend(txt);
    }
  } catch {
    // Fallback directo a Gemini
    await callGeminiFrontend(txt);
  }

  loading = false;
  document.getElementById("sendBtn").disabled = false;
  inp.focus();
}

// ── FALLBACK DIRECTO A GEMINI ──
async function callGeminiFrontend(userTxt) {
  try {
    const geminiMsgs = messages.map(m => ({
      role: m.role === "assistant" ? "model" : "user",
      parts: [{ text: m.content }]
    }));

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: `Eres POSChat, un asistente inteligente para negocios en República Dominicana. Eres amigable, eficiente y respondes en español dominicano natural. Ayudas con gestión de inventario, pedidos, clientes y ventas. Fecha actual: ${new Date().toLocaleDateString("es-DO")}` }] },
          contents: geminiMsgs,
          generation_config: { temperature: 0.7, max_output_tokens: 1024 }
        })
      }
    );
    const d = await res.json();
    removeTyping();
    const txt = d.candidates?.[0]?.content?.parts?.[0]?.text || "No pude responder en este momento.";
    messages.push({ role: "assistant", content: txt });
    addMsg("assistant", txt);
  } catch (err) {
    removeTyping();
    addMsg("assistant", "❌ Error de conexión. Verifica tu internet e intenta de nuevo.");
  }
}
</script>
</body>
</html>
