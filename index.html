<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>POSChat IA</title>
<script src="https://js.puter.com/v2/"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e0e;
  --bg2:#161616;
  --bg3:#1e1e1e;
  --border:#2a2a2a;
  --green:#22c55e;
  --white:#ffffff;
  --gray:#888;
  --gray2:#444;
  --chip:#1c1c1c;
  --chip-border:#2e2e2e;
  --input-bg:#181818;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);overflow:hidden}

/* ── SHELL ── */
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--bg)}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px 11px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;background:var(--bg);z-index:10;
}
.topbar-left{display:flex;align-items:center;gap:10px}
.av-sm{
  width:40px;height:40px;border-radius:50%;
  border:2px solid var(--green);overflow:hidden;
  background:#111;flex-shrink:0;
}
.av-sm img{width:100%;height:100%;object-fit:cover}
.t-name{font-size:.93rem;font-weight:700;letter-spacing:-.2px}
.t-status{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--green);margin-top:2px;font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-actions{display:flex;gap:7px}
.ibtn{
  width:36px;height:36px;border-radius:9px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--white);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
}
.ibtn:hover{background:#252525}
.ibtn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* ── MODEL BADGE ── */
.model-bar{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:7px 16px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.mbadge{
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);
  color:var(--green);font-size:.68rem;font-weight:700;letter-spacing:.5px;
  padding:3px 10px;border-radius:20px;
}
.mfree{color:var(--gray);font-size:.68rem}

/* ── MESSAGES ── */
.msgs{flex:1;overflow-y:auto;padding:0 0 8px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.msgs::-webkit-scrollbar{width:0}

/* ── WELCOME ── */
.welcome{display:flex;flex-direction:column;align-items:center;padding:36px 24px 20px;text-align:center}
.av-wrap{position:relative;width:108px;height:108px;margin-bottom:20px}
.av-glow{position:absolute;inset:-10px;border-radius:50%;background:radial-gradient(circle,rgba(34,197,94,.3) 0%,transparent 70%);animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
.av-ring{position:absolute;inset:0;border-radius:50%;border:2.5px solid var(--green);animation:ringp 3s ease-in-out infinite}
@keyframes ringp{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}
.av-img{width:100%;height:100%;border-radius:50%;object-fit:cover;background:#111;position:relative;z-index:1}
.w-title{font-size:1.5rem;font-weight:700;margin-bottom:9px;letter-spacing:-.3px}
.w-title span{color:var(--green)}
.w-sub{font-size:.85rem;color:var(--gray);line-height:1.65;max-width:290px;margin-bottom:26px}

/* ── CHIPS ── */
.chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:330px}
.chip{
  display:flex;align-items:center;gap:6px;
  background:var(--chip);border:1px solid var(--chip-border);
  color:#ccc;padding:8px 15px;border-radius:22px;
  font-size:.8rem;font-weight:500;cursor:pointer;
  transition:all .2s;font-family:'Inter',sans-serif;
}
.chip:hover{background:#252525;border-color:#3a3a3a;color:var(--white);transform:translateY(-1px)}
.chip svg{width:13px;height:13px;stroke:#666;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ── BUBBLES ── */
.mg{padding:5px 14px}
.msg{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.msg.user{flex-direction:row-reverse}
.mav{width:28px;height:28px;border-radius:50%;flex-shrink:0;overflow:hidden;border:1.5px solid var(--border);background:#111;display:flex;align-items:center;justify-content:center}
.mav img{width:100%;height:100%;object-fit:cover}
.mav svg{width:14px;height:14px;stroke:#666;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.bubble{max-width:80%;padding:10px 14px;border-radius:17px;font-size:.86rem;line-height:1.62}
.msg.assistant .bubble{background:var(--bg3);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--white)}
.msg.user .bubble{background:var(--green);color:#000;font-weight:500;border-bottom-right-radius:4px}
.msg.assistant .bubble strong{color:#a3e635}
.msg.assistant .bubble code{background:#111;padding:1px 5px;border-radius:4px;font-size:.82rem;color:#67e8f9}

/* ── STREAMING cursor ── */
.cursor{display:inline-block;width:2px;height:14px;background:var(--green);margin-left:2px;vertical-align:middle;animation:blink .7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── TOOLS ── */
.tools-row{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0 0 36px}
.ttag{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:#4ade80;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:9px;letter-spacing:.3px}

/* ── TYPING ── */
.ty-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:17px;border-bottom-left-radius:4px;padding:11px 15px;display:inline-flex;gap:5px;align-items:center}
.ty-bubble span{width:6px;height:6px;background:var(--gray);border-radius:50%;animation:bounce .8s infinite}
.ty-bubble span:nth-child(2){animation-delay:.15s}
.ty-bubble span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* ── INPUT ── */
.inp-wrap{padding:9px 13px 16px;flex-shrink:0;background:var(--bg)}
.inp-box{
  display:flex;align-items:center;gap:7px;
  background:var(--input-bg);border:1px solid var(--border);
  border-radius:26px;padding:7px 7px 7px 16px;transition:border-color .2s;
}
.inp-box:focus-within{border-color:#333}
#inp{flex:1;background:none;border:none;outline:none;color:var(--white);font-size:.87rem;font-family:'Inter',sans-serif;resize:none;max-height:96px;line-height:1.5}
#inp::placeholder{color:var(--gray2)}
.abtn{width:34px;height:34px;border-radius:50%;background:none;border:none;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:color .2s}
.abtn:hover{color:#aaa}
.abtn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sbtn{width:38px;height:38px;border-radius:50%;background:var(--green);border:none;color:#000;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.sbtn:hover{background:#16a34a;transform:scale(1.05)}
.sbtn:disabled{background:#1a2e1a;cursor:default;transform:none}
.sbtn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2.3;stroke-linecap:round;stroke-linejoin:round;margin-left:1px}

/* ── LIGHT THEME ── */
.lt{--bg:#f5f5f5;--bg2:#eee;--bg3:#e2e2e2;--border:#d0d0d0;--white:#111;--gray:#777;--gray2:#aaa;--chip:#e8e8e8;--chip-border:#ccc;--input-bg:#e5e5e5}

/* ── DESKTOP ── */
@media(min-width:520px){
  .app{border-left:1px solid var(--border);border-right:1px solid var(--border);box-shadow:0 0 60px rgba(0,0,0,.6)}
  body{background:#080808}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="av-sm">
        <img src="https://media.base44.com/images/public/69dbad34b7190bc2a2faee7c/c571fa4ed_1000139184-removebg-preview.png" alt="POSChat"/>
      </div>
      <div>
        <div class="t-name">POSChat IA</div>
        <div class="t-status"><span class="dot"></span>En línea</div>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="ibtn" onclick="newChat()" title="Nueva conversación">
        <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
      <button class="ibtn" onclick="toggleTheme()" title="Tema claro/oscuro">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>

  <!-- MODEL BAR -->
  <div class="model-bar">
    <span class="mbadge" id="modelBadge">⚡ DeepSeek v4 Flash</span>
    <span class="mfree">· Gratis · Sin API key</span>
    <button class="ibtn" style="width:auto;padding:0 10px;font-size:.7rem;color:var(--gray)" onclick="toggleModel()" title="Cambiar modelo">Cambiar</button>
  </div>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs"></div>

  <!-- INPUT -->
  <div class="inp-wrap">
    <div class="inp-box">
      <textarea id="inp" rows="1"
        placeholder="Escríbele a POSChat..."
        onkeydown="hk(event)"
        oninput="rs(this)"></textarea>
      <label class="abtn" title="Adjuntar archivo">
        <input type="file" style="display:none" accept="image/*,.pdf,.txt" onchange="hf(event)"/>
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
      </label>
      <button class="sbtn" id="sbtn" onclick="send()">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div>
<script>
// ── CONFIG ──
const LOGO = "https://media.base44.com/images/public/69dbad34b7190bc2a2faee7c/c571fa4ed_1000139184-removebg-preview.png";
const BACKEND = "https://api.base44.com/api/apps/69dbad34b7190bc2a2faee7c/functions/geminiChat";
const MODELS = [
  { id: "deepseek/deepseek-v4-flash",   label: "⚡ DeepSeek v4 Flash" },
  { id: "deepseek/deepseek-v4-pro",     label: "🧠 DeepSeek v4 Pro" },
  { id: "deepseek/deepseek-v3.2",       label: "🔬 DeepSeek v3.2" },
  { id: "deepseek/deepseek-r1-0528",    label: "💡 DeepSeek R1" },
];
const SYS = `Eres POSChat, un asistente inteligente para colmados y negocios en República Dominicana.
Puedes ayudar con: inventario, pedidos, precios, clientes, ventas, reportes y recomendaciones.
Responde en español dominicano natural. Sé conciso, útil y directo.
Fecha/Hora actual: ${new Date().toLocaleString("es-DO",{timeZone:"America/Santo_Domingo"})}`;

// ── STATE ──
let msgs = [];
let busy = false;
let dark = true;
let modelIdx = 0;

// ── INIT ──
renderWelcome();

// ── WELCOME ──
function renderWelcome(){
  document.getElementById("msgs").innerHTML = `
  <div class="welcome">
    <div class="av-wrap">
      <div class="av-glow"></div>
      <div class="av-ring"></div>
      <img class="av-img" src="${LOGO}" alt="POSChat"/>
    </div>
    <div class="w-title">Hola, soy <span>POSChat</span></div>
    <div class="w-sub">Tu asistente inteligente para gestión de tu negocio. Inventario, pedidos, clientes y mucho más.</div>
    <div class="chips">
      <button class="chip" onclick="sug('¿Cuántos productos tengo en inventario y cuáles tienen stock bajo?')">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Inventario
      </button>
      <button class="chip" onclick="sug('Muéstrame los pedidos pendientes de hoy')">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        Pedidos
      </button>
      <button class="chip" onclick="sug('¿Qué puedes hacer por mi negocio?')">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        ¿Qué haces?
      </button>
      <button class="chip" onclick="sug('¿Cuánto vendí hoy? Dame el resumen del día')">
        <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Ventas hoy
      </button>
      <button class="chip" onclick="sug('Lista los clientes que tienen deuda pendiente')">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Clientes
      </button>
      <button class="chip" onclick="sug('Dame ideas para aumentar las ventas de mi colmado este mes')">
        <svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        Ideas de ventas
      </button>
    </div>
  </div>`;
}

// ── HELPERS ──
function rs(el){el.style.height="auto";el.style.height=Math.min(el.scrollHeight,96)+"px"}
function hk(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}}
function hf(e){const f=e.target.files[0];if(f)addBubble("user",`📎 ${f.name}`)}
function scroll(){const el=document.getElementById("msgs");setTimeout(()=>el.scrollTop=el.scrollHeight,50)}
function newChat(){msgs=[];renderWelcome()}
function toggleTheme(){dark=!dark;document.getElementById("app").classList.toggle("lt",!dark)}
function sug(t){document.getElementById("inp").value=t;send()}

function toggleModel(){
  modelIdx=(modelIdx+1)%MODELS.length;
  document.getElementById("modelBadge").textContent=MODELS[modelIdx].label;
}

// ── RENDER BURBUJA ──
function addBubble(role, text, tools=[]){
  document.querySelector(".welcome")?.remove();
  const c=document.getElementById("msgs");
  const d=document.createElement("div");
  d.className="mg";
  const toolsHtml=tools.length?`<div class="tools-row">${tools.map(t=>`<span class="ttag">⚡ ${t}</span>`).join("")}</div>`:"";
  if(role==="user"){
    d.innerHTML=`<div class="msg user">
      <div class="bubble">${esc(text)}</div>
      <div class="mav"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
    </div>`;
  } else {
    d.innerHTML=`<div class="msg assistant">
      <div class="mav"><img src="${LOGO}" alt="bot"/></div>
      <div class="bubble" id="b-${Date.now()}">${fmt(text)}</div>
    </div>${toolsHtml}`;
  }
  c.appendChild(d);scroll();
  return d.querySelector(".bubble");
}

function addTyping(){
  document.querySelector(".welcome")?.remove();
  const c=document.getElementById("msgs");
  const d=document.createElement("div");
  d.className="mg";d.id="ty";
  d.innerHTML=`<div class="msg assistant">
    <div class="mav"><img src="${LOGO}" alt="bot"/></div>
    <div class="ty-bubble"><span></span><span></span><span></span></div>
  </div>`;
  c.appendChild(d);scroll();
}
function remTyping(){document.getElementById("ty")?.remove()}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br/>")}
function fmt(s){
  return s
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\n/g,"<br/>");
}

// ── SEND ──
async function send(){
  const el=document.getElementById("inp");
  const txt=el.value.trim();
  if(!txt||busy)return;

  busy=true;
  el.value="";el.style.height="auto";
  document.getElementById("sbtn").disabled=true;

  msgs.push({role:"user",content:txt});
  addBubble("user",txt);
  addTyping();

  try {
    // 1. Intentar backend Base44 primero (tiene acceso a DB real)
    let backendOk = false;
    try {
      const res = await fetch(BACKEND, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({messages:msgs.map(m=>({role:m.role,content:m.content})),userId:"poschat-user"})
      });
      if(res.ok){
        const data = await res.json();
        if(data.response && data.response.length > 5){
          remTyping();
          msgs.push({role:"assistant",content:data.response});
          addBubble("assistant",data.response,data.toolsUsed||[]);
          backendOk=true;
        }
      }
    } catch(_){}

    // 2. Fallback a Puter.js con DeepSeek (siempre disponible)
    if(!backendOk){
      remTyping();
      document.querySelector(".welcome")?.remove();
      const c=document.getElementById("msgs");
      const wrap=document.createElement("div");
      wrap.className="mg";
      wrap.innerHTML=`<div class="msg assistant">
        <div class="mav"><img src="${LOGO}" alt="bot"/></div>
        <div class="bubble" id="stream-bubble"></div>
      </div>`;
      c.appendChild(wrap);scroll();

      const bubble=document.getElementById("stream-bubble");
      let full="";

      const sysMsg={role:"system",content:SYS};
      const chatMsgs=[sysMsg,...msgs.map(m=>({role:m.role,content:m.content}))];

      const resp = await puter.ai.chat(chatMsgs, {
        model: MODELS[modelIdx].id,
        stream: true
      });

      for await (const part of resp){
        const chunk = part?.text || part?.delta?.content || "";
        if(chunk){
          full+=chunk;
          bubble.innerHTML=fmt(full)+'<span class="cursor"></span>';
          scroll();
        }
      }
      bubble.innerHTML=fmt(full);
      msgs.push({role:"assistant",content:full});
    }

  } catch(err){
    remTyping();
    addBubble("assistant","❌ Ocurrió un error. Verifica tu conexión e inténtalo de nuevo.\n\n`"+err.message+"`");
  }

  busy=false;
  document.getElementById("sbtn").disabled=false;
  el.focus();
}
</script>
</body>
</html>
